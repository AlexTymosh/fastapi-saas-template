services:
  app:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fastapi_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP__ENVIRONMENT: local
      LOGGING__AS_JSON: "true"
      RATE_LIMITING__ENABLED: "false"

      DATABASE__URL: postgresql+psycopg://app:app@postgres:5432/app
      TEST_DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/app

      REDIS__URL: redis://redis:6379/0
      TEST_REDIS_URL: redis://redis:6379/0

      VAULT__ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fastapi_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP__ENVIRONMENT: local
      LOGGING__AS_JSON: "true"
      DATABASE__URL: postgresql+psycopg://app:app@postgres:5432/app
      REDIS__URL: redis://redis:6379/0
      VAULT__ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: dramatiq app.outbox.worker_runtime

  outbox-dispatcher:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fastapi_outbox_dispatcher
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP__ENVIRONMENT: local
      LOGGING__AS_JSON: "true"
      DATABASE__URL: postgresql+psycopg://app:app@postgres:5432/app
      REDIS__URL: redis://redis:6379/0
      VAULT__ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.outbox.dispatcher --interval 5 --batch-size 100

  postgres:
    image: postgres:17-alpine
    container_name: fastapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: fastapi_keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HEALTH_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      default:
        aliases:
          - keycloak.local
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&3; grep 'HTTP/1.0 200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  vault:
    image: hashicorp/vault:1.21
    container_name: fastapi_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    command: >
      vault server
      -dev
      -dev-root-token-id=dev-only-root-token
      -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.21
    container_name: fastapi_vault_init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-only-root-token
    volumes:
      - ./docker/vault/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"


  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.122.1
    container_name: fastapi_otel_collector
    restart: unless-stopped
    profiles:
      - observability
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./docker/otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4318:4318"

volumes:
  postgres_data:
  redis_data:
