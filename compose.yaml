services:
  app:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: fastapi_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP__ENVIRONMENT: local
      LOGGING__AS_JSON: "true"

      VAULT__ENABLED: "true"
      VAULT__ADDR: http://vault:8200
      VAULT__TOKEN: dev-only-root-token
      VAULT__MOUNT: secret
      VAULT__PATH: fastapi-saas-template
      VAULT__AUTH_METHOD: token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.env:/app/.env:ro
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:17-alpine
    container_name: fastapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: fastapi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault:
    image: hashicorp/vault:1.21
    container_name: fastapi_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    command: >
      vault server
      -dev
      -dev-root-token-id=dev-only-root-token
      -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  vault-init:
    image: hashicorp/vault:1.21
    container_name: fastapi_vault_init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-only-root-token
    volumes:
      - ./docker/vault/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

volumes:
  postgres_data:
  redis_data: